global:
  # Target environment — used for labelling/annotations
  environment: production

app:
  # Number of WordPress pod replicas
  replicaCount: 1
  image:
    repository: wordpress
    tag: "6.2.2-apache"
    pullPolicy: IfNotPresent
  # busybox image used by the wait-for-mariadb initContainer
  busyboxImage: "busybox:1.36"
  # PVC size for /var/www/html
  storage: 5Gi
  # Leave empty to use the cluster default StorageClass
  storageClassName: ""
  # Deployment update strategy — Recreate avoids ReadWriteOncePod multi-attach on single-replica
  deployStrategy: Recreate
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

oauth:
  # Keycloak client ID registered for this WordPress instance
  clientId: "wordpress"
  # OIDC issuer URL — must match the Keycloak realm base URL
  issuerUrl: "https://auth.example.com/realms/smart-city"
  # clientSecret is injected via the credentials secret — never set a default here

database:
  # Set to false to use an external database
  enabled: true
  image:
    repository: mariadb
    tag: "10.11.4"
    pullPolicy: IfNotPresent
  # PVC size for /var/lib/mysql
  storage: 10Gi
  # Leave empty to use the cluster default StorageClass
  storageClassName: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

ingress:
  # Set to false to skip rendering Traefik IngressRoute resources
  enabled: true
  # Fully-qualified public hostname
  host: www.mark-frost.sk
  # Traefik cert-manager resolver name (set to "" to use tlsSecretName instead)
  certResolver: letsencrypt
  # Existing TLS secret name — used when certResolver is empty
  tlsSecretName: ""

podDisruptionBudget:
  # Protect WordPress pods from being evicted simultaneously during node drain
  enabled: true
  minAvailable: 1

autoscaling:
  # Enable HorizontalPodAutoscaler for the WordPress web pods
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  # Target CPU utilization percentage before scaling out
  targetCPUUtilizationPercentage: 70
  # Target memory utilization percentage before scaling out
  targetMemoryUtilizationPercentage: 80

networkPolicy:
  # Enforce ingress/egress rules — requires a CNI that supports NetworkPolicy (Calico, Cilium, etc.)
  enabled: true
  # Namespace where Traefik is installed — used to restrict port 80 ingress to Traefik only.
  # The namespace must be labelled: kubernetes.io/metadata.name=<namespace>
  # Leave empty ("") to allow all pods in the namespace (less secure).
  traefikNamespace: "traefik"

sealedSecret:
  # When true, a Bitnami SealedSecret is rendered instead of a plain Kubernetes Secret.
  # Requires the Sealed Secrets controller to be installed in the cluster.
  enabled: true
  encryptedData:
    # Generate with: kubeseal --raw --from-file=<(echo -n 'value') --namespace <ns> --name <release>-wordpress-credentials
    mariadb-root-password: ""
    mariadb-password: ""
    wordpress-password: ""
    oauth-client-secret: ""

# Plain Secret values — used only when sealedSecret.enabled is false.
# NEVER commit real credentials here. Provide via --set or a local override file that is git-ignored.
secret:
  mariadbRootPassword: ""
  mariadbPassword: ""
  wordpressPassword: ""
  oauthClientSecret: ""
