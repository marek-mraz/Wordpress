{{- if .Values.ingress.enabled }}
{{- $host := .Values.ingress.host }}
{{- $hasWww := hasPrefix "www." $host }}
{{- $nakedHost := trimPrefix "www." $host }}

# Redirect all plain HTTP traffic to HTTPS
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "wordpress.fullname" . }}-redirect-https
  labels:
    {{- include "wordpress.labels" . | nindent 4 }}
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
{{- if $hasWww }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "wordpress.fullname" . }}-redirect-www
  labels:
    {{- include "wordpress.labels" . | nindent 4 }}
spec:
  redirectRegex:
    regex: "^https?://{{ $nakedHost }}/(.*)"
    replacement: "https://{{ $host }}/${1}"
    permanent: true
---
{{- end }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "wordpress.fullname" . }}-http
  labels:
    {{- include "wordpress.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`{{ $host }}`){{ if $hasWww }} || Host(`{{ $nakedHost }}`){{ end }}
      kind: Rule
      middlewares:
        - name: {{ include "wordpress.fullname" . }}-redirect-https
      services:
        - name: {{ include "wordpress.fullname" . }}-web
          port: 8080
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "wordpress.fullname" . }}-https
  labels:
    {{- include "wordpress.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ $host }}`)
      kind: Rule
      services:
        - name: {{ include "wordpress.fullname" . }}-web
          port: 8080
{{- if $hasWww }}
    - match: Host(`{{ $nakedHost }}`)
      kind: Rule
      middlewares:
        - name: {{ include "wordpress.fullname" . }}-redirect-www
      services:
        - name: {{ include "wordpress.fullname" . }}-web
          port: 8080
{{- end }}
  tls:
    {{- if .Values.ingress.certResolver }}
    certResolver: {{ .Values.ingress.certResolver }}
    {{- else if .Values.ingress.tlsSecretName }}
    secretName: {{ .Values.ingress.tlsSecretName }}
    {{- end }}
{{- end }}
