{{- if .Values.database.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "wordpress.fullname" . }}-mariadb
  labels:
    {{- include "wordpress.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  serviceName: {{ include "wordpress.fullname" . }}-mariadb-headless
  replicas: 1
  selector:
    matchLabels:
      {{- include "wordpress.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: database
  template:
    metadata:
      labels:
        {{- include "wordpress.labels" . | nindent 8 }}
        app.kubernetes.io/component: database
      annotations:
        # Velero File System Backup Opt-In
        backup.velero.io/backup-volumes: mariadb-data
        # Application-Consistent Pre-Backup Hook (Quiesce)
        pre.hook.backup.velero.io/container: mariadb
        pre.hook.backup.velero.io/command: '["/bin/sh", "-c", "mysql -u root -p${MARIADB_ROOT_PASSWORD} -e \"FLUSH TABLES WITH READ LOCK;\""]'
        pre.hook.backup.velero.io/timeout: 120s
        pre.hook.backup.velero.io/on-error: Fail
        # Application-Consistent Post-Backup Hook (Unquiesce)
        post.hook.backup.velero.io/container: mariadb
        post.hook.backup.velero.io/command: '["/bin/sh", "-c", "mysql -u root -p${MARIADB_ROOT_PASSWORD} -e \"UNLOCK TABLES;\""]'
        post.hook.backup.velero.io/timeout: 120s
    spec:
      serviceAccountName: {{ include "wordpress.dbServiceAccountName" . }}
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mariadb
          image: "{{ .Values.database.image.repository }}:{{ .Values.database.image.tag }}"
          imagePullPolicy: {{ .Values.database.image.pullPolicy }}
          securityContext:
            # MariaDB image initialises as root then drops to mysql (UID 999) via gosu;
            # runAsNonRoot is not set for compatibility with the official image init sequence.
            # CHOWN/SETUID/SETGID/DAC_OVERRIDE are required for the entrypoint chown+gosu sequence.
            allowPrivilegeEscalation: true
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN
                - SETUID
                - SETGID
                - DAC_OVERRIDE
          ports:
            - containerPort: 3306
          env:
            - name: MARIADB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "wordpress.fullname" . }}-credentials
                  key: mariadb-root-password
            - name: MARIADB_USER
              value: wordpress
            - name: MARIADB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "wordpress.fullname" . }}-credentials
                  key: mariadb-password
            - name: MARIADB_DATABASE
              value: wordpress
          volumeMounts:
            - name: mariadb-data
              mountPath: /var/lib/mysql
            - name: tmp
              mountPath: /tmp
            - name: run-mysqld
              mountPath: /var/run/mysqld
          resources:
            {{- toYaml .Values.database.resources | nindent 12 }}
          # Rigorous Lifecycle Probing
          startupProbe:
            exec:
              command:
                - sh
                - -c
                - mysqladmin ping -h localhost -u root -p${MARIADB_ROOT_PASSWORD}
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - mysqladmin ping -h localhost -u root -p${MARIADB_ROOT_PASSWORD}
            failureThreshold: 3
            periodSeconds: 15
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - mysqladmin ping -h localhost -u root -p${MARIADB_ROOT_PASSWORD}
            failureThreshold: 3
            periodSeconds: 10
      volumes:
        - name: tmp
          emptyDir: {}
        - name: run-mysqld
          emptyDir: {}
  # Persistent Storage Provisioning
  volumeClaimTemplates:
    - metadata:
        name: mariadb-data
      spec:
        accessModes:
          - ReadWriteOncePod
        {{- if .Values.database.storageClassName }}
        storageClassName: {{ .Values.database.storageClassName }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.database.storage }}
{{- end }}
