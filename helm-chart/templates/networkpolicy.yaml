{{- if .Values.networkPolicy.enabled }}
# WordPress: allow ingress on port 80 from the Traefik namespace (and optionally
# additional sources), egress to MariaDB on 3306, DNS, and HTTPS for OAuth.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "wordpress.fullname" . }}-web
  labels:
    {{- include "wordpress.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  podSelector:
    matchLabels:
      {{- include "wordpress.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: web
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        # Traefik runs in its own namespace — allow by namespace label.
        # Label the Traefik namespace with: kubectl label ns <traefik-ns> kubernetes.io/metadata.name=<traefik-ns>
        {{- if .Values.networkPolicy.traefikNamespace }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.traefikNamespace | quote }}
        {{- else }}
        # networkPolicy.traefikNamespace is not set — allowing all sources on port 80.
        # Set networkPolicy.traefikNamespace in values to restrict ingress to Traefik only.
        - podSelector: {}
        {{- end }}
      ports:
        - port: 80
  egress:
    # DNS resolution
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # MariaDB
    - to:
        - podSelector:
            matchLabels:
              {{- include "wordpress.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: database
      ports:
        - port: 3306
    # External HTTPS — required for OAuth issuer and WordPress plugin updates
    - ports:
        - port: 443
          protocol: TCP
---
# MariaDB: allow ingress only from WordPress pods on 3306, egress DNS only.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "wordpress.fullname" . }}-db
  labels:
    {{- include "wordpress.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  podSelector:
    matchLabels:
      {{- include "wordpress.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: database
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "wordpress.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: web
      ports:
        - port: 3306
  egress:
    # DNS resolution only
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
{{- end }}
