apiVersion: v1
kind: Pod
metadata:
  name: {{ include "wordpress.fullname" . }}-test-connection
  labels:
    {{- include "wordpress.labels" . | nindent 4 }}
    app.kubernetes.io/component: test
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
  containers:
    - name: test-http
      image: busybox:1.36
      imagePullPolicy: IfNotPresent
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
      command:
        - sh
        - -c
        - |
          # Verify WordPress HTTP endpoint is reachable
          wget -qO- --timeout=10 http://{{ include "wordpress.fullname" . }}-web:8080/wp-login.php | grep -q "WordPress" && echo "WordPress HTTP: OK"
    {{- if .Values.database.enabled }}
    - name: test-mariadb
      image: busybox:1.36
      imagePullPolicy: IfNotPresent
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
      command:
        - sh
        - -c
        - |
          # Verify MariaDB port is reachable from inside the cluster
          nc -z -w 5 {{ include "wordpress.fullname" . }}-mariadb 3306 && echo "MariaDB port 3306: OK"
    {{- end }}
