apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "wordpress.fullname" . }}-web
  labels:
    {{- include "wordpress.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.app.replicaCount }}
  strategy:
    type: {{ .Values.app.deployStrategy }}
  selector:
    matchLabels:
      {{- include "wordpress.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        {{- include "wordpress.labels" . | nindent 8 }}
        app.kubernetes.io/component: web
    spec:
      serviceAccountName: {{ include "wordpress.serviceAccountName" . }}
      automountServiceAccountToken: false
      affinity:
        podAntiAffinity:
          # Prefer spreading replicas across nodes — soft rule so scheduling isn't blocked
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    {{- include "wordpress.selectorLabels" . | nindent 20 }}
                    app.kubernetes.io/component: web
                topologyKey: kubernetes.io/hostname
      securityContext:
        fsGroup: 33
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-mariadb
          image: {{ .Values.app.busyboxImage }}
          imagePullPolicy: {{ .Values.app.image.pullPolicy }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          command:
            - sh
            - -c
            - |
              until nc -z -w 2 {{ include "wordpress.fullname" . }}-mariadb 3306; do
                echo "Waiting for MariaDB at {{ include "wordpress.fullname" . }}-mariadb:3306..."
                sleep 3
              done
              echo "MariaDB is ready."
      containers:
        - name: wordpress
          image: "{{ .Values.app.image.repository }}:{{ .Values.app.image.tag }}"
          imagePullPolicy: {{ .Values.app.image.pullPolicy }}
          securityContext:
            # WordPress Apache image starts as root to bind port 80 and fork www-data workers;
            # runAsNonRoot and readOnlyRootFilesystem are not set for compatibility with the official image.
            allowPrivilegeEscalation: true
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN
                - SETUID
                - SETGID
                - NET_BIND_SERVICE
                - DAC_OVERRIDE
          ports:
            - name: http
              containerPort: 80
          env:
            - name: WORDPRESS_DB_HOST
              value: {{ include "wordpress.fullname" . }}-mariadb
            - name: WORDPRESS_DB_USER
              value: wordpress
            - name: WORDPRESS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "wordpress.fullname" . }}-credentials
                  key: mariadb-password
            - name: WORDPRESS_DB_NAME
              value: wordpress
            - name: WORDPRESS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "wordpress.fullname" . }}-credentials
                  key: wordpress-password
            {{- if .Values.oauth }}
            - name: OAUTH_CLIENT_ID
              value: {{ .Values.oauth.clientId | quote }}
            - name: OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "wordpress.fullname" . }}-credentials
                  key: oauth-client-secret
            - name: OAUTH_ISSUER_URL
              value: {{ .Values.oauth.issuerUrl | quote }}
            {{- end }}
          volumeMounts:
            - name: wordpress-data
              mountPath: /var/www/html
          resources:
            {{- toYaml .Values.app.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: /wp-login.php
              port: http
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /wp-login.php
              port: http
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: wordpress-data
          persistentVolumeClaim:
            claimName: {{ include "wordpress.fullname" . }}-wp-pvc
