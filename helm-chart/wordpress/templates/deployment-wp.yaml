apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "wordpress.fullname" . }}-web
  labels:
    {{- include "wordpress.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.app.replicaCount }}
  strategy:
    type: {{ .Values.app.deployStrategy }}
  selector:
    matchLabels:
      {{- include "wordpress.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        {{- include "wordpress.labels" . | nindent 8 }}
        app.kubernetes.io/component: web
    spec:
      serviceAccountName: {{ include "wordpress.serviceAccountName" . }}
      automountServiceAccountToken: false
      affinity:
        podAntiAffinity:
          # Prefer spreading replicas across nodes — soft rule so scheduling isn't blocked
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    {{- include "wordpress.selectorLabels" . | nindent 20 }}
                    app.kubernetes.io/component: web
                topologyKey: kubernetes.io/hostname
      securityContext:
        fsGroup: 33
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: wait-for-mariadb
          image: {{ .Values.app.busyboxImage }}
          imagePullPolicy: {{ .Values.app.image.pullPolicy }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          command:
            - sh
            - -c
            - |
              until nc -z -w 2 {{ include "wordpress.fullname" . }}-mariadb 3306; do
                echo "Waiting for MariaDB at {{ include "wordpress.fullname" . }}-mariadb:3306..."
                sleep 3
              done
              echo "MariaDB is ready."
      containers:
        - name: wordpress
          image: "{{ .Values.app.image.repository }}:{{ .Values.app.image.tag }}"
          imagePullPolicy: {{ .Values.app.image.pullPolicy }}
          securityContext:
            # WordPress Apache image starts as root to bind port 80 and fork www-data workers;
            # runAsNonRoot and readOnlyRootFilesystem are not set for compatibility with the official image.
            allowPrivilegeEscalation: true
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN
                - SETUID
                - SETGID
                - NET_BIND_SERVICE
                - DAC_OVERRIDE
          ports:
            - name: http
              containerPort: 80
          env:
            - name: WORDPRESS_DB_HOST
              value: {{ include "wordpress.fullname" . }}-mariadb
            - name: WORDPRESS_DB_USER
              value: wordpress
            - name: WORDPRESS_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "wordpress.fullname" . }}-credentials
                  key: mariadb-password
            - name: WORDPRESS_DB_NAME
              value: wordpress
            - name: WORDPRESS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "wordpress.fullname" . }}-credentials
                  key: wordpress-password
            - name: WP_THEME
              value: {{ .Values.app.theme | default "" | quote }}
            - name: WP_PLUGINS
              value: {{ .Values.app.plugins | default "" | quote }}
            {{- if .Values.oauth.enabled }}
            - name: OIDC_CLIENT_ID
              value: {{ .Values.oauth.clientId | quote }}
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "wordpress.fullname" . }}-credentials
                  key: oauth-client-secret
            - name: OIDC_SCOPE
              value: {{ .Values.oauth.scope | quote }}
            - name: OIDC_ENDPOINT_LOGIN
              value: {{ .Values.oauth.endpointLogin | quote }}
            - name: OIDC_ENDPOINT_USERINFO
              value: {{ .Values.oauth.endpointUserInfo | quote }}
            - name: OIDC_ENDPOINT_TOKEN
              value: {{ .Values.oauth.endpointToken | quote }}
            - name: OIDC_ENDPOINT_LOGOUT
              value: {{ .Values.oauth.endpointLogout | quote }}
            - name: OIDC_IDENTITY_KEY
              value: {{ .Values.oauth.identityKey | quote }}
            - name: OIDC_NICKNAME_KEY
              value: {{ .Values.oauth.nicknameKey | quote }}
            - name: OIDC_EMAIL_FORMAT
              value: {{ .Values.oauth.emailFormat | quote }}
            - name: OIDC_DISPLAYNAME_FORMAT
              value: {{ .Values.oauth.displayNameFormat | quote }}
            - name: OIDC_LINK_EXISTING_USERS
              value: {{ .Values.oauth.linkExistingUsers | quote }}
            - name: OIDC_CREATE_IF_NOT_EXISTS
              value: {{ .Values.oauth.createIfNotExists | quote }}
            - name: OIDC_REDIRECT_BACK
              value: {{ .Values.oauth.redirectBack | quote }}
            - name: OIDC_IDENTIFY_WITH_USERNAME
              value: {{ .Values.oauth.identifyWithUsername | quote }}
            - name: OIDC_ENABLE_REFRESH_TOKEN
              value: {{ .Values.oauth.enableRefreshToken | quote }}
            - name: OIDC_ENFORCE_PRIVACY
              value: {{ .Values.oauth.enforcePrivacy | quote }}
            {{- end }}
          volumeMounts:
            - name: wordpress-data
              mountPath: /var/www/html
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/bash
                  - -c
                  - |
                    cat << 'EOF' > /usr/local/bin/setup-wp.sh
                    #!/bin/bash
                    while [ ! -f /var/www/html/wp-config.php ]; do sleep 5; done
                    sleep 10 # Allow WP to complete initial file copy
                    if [ -n "$WP_THEME" ]; then
                      wp theme install "$WP_THEME" --activate --allow-root || true
                    fi
                    if [ -n "$WP_PLUGINS" ]; then
                      for plugin in $WP_PLUGINS; do
                        wp plugin install "$plugin" --activate --allow-root || true
                      done
                    fi
                    wp plugin activate daggerhart-openid-connect-generic --allow-root || true
                    EOF
                    chmod +x /usr/local/bin/setup-wp.sh
                    nohup /usr/local/bin/setup-wp.sh > /var/www/html/setup-wp.log 2>&1 &
          resources:
            {{- toYaml .Values.app.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: /wp-login.php
              port: http
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /wp-login.php
              port: http
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: wordpress-data
          persistentVolumeClaim:
            claimName: {{ include "wordpress.fullname" . }}-wp-pvc
