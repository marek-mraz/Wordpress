services:
  wordpress:
    container_name: local_wp_app
    # If you have a custom Dockerfile with Composer, keep 'build: .'. 
    # Otherwise, you can use the official image: 'image: wordpress:latest'
    build: . 
    restart: unless-stopped
    ports:
      - "8080:80" # Access locally via http://localhost:8080
    volumes:
      # Persist WordPress core and uploads
      - wp_data:/var/www/html
      
      # Bind mounts for local development (mapped exactly to your tree structure)
      # Any changes made in your IDE will instantly reflect in the container
      - ./wp-content/themes:/var/www/html/wp-content/themes
      - ./wp-content/plugins:/var/www/html/wp-content/plugins
      - ./wp-content/mu-plugins:/var/www/html/wp-content/mu-plugins
      
      # Local configuration overrides
      - ./config/php.conf.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      # Database connection
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: local_user
      WORDPRESS_DB_PASSWORD: local_password
      WORDPRESS_DB_NAME: local_db
      
      # Redis configuration
      WORDPRESS_REDIS_HOST: redis
      WORDPRESS_REDIS_PORT: 6379
      
      # DEVELOPMENT FLAGS: Enable debug mode to catch PHP notices/errors
      WORDPRESS_DEBUG: 1
      
      # Extra Config (Limits, URLs, etc)
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_MEMORY_LIMIT', '512M');
        define('WP_HOME', 'http://localhost:8080');
        define('WP_SITEURL', 'http://localhost:8080');
        define('FS_METHOD', 'direct'); // Allows installing plugins locally without FTP prompts

      # (Optional) You can keep your OIDC variables here if you need to test SSO locally
      # OIDC_CLIENT_ID: ${OIDC_CLIENT_ID}
      # ...

    networks:
      - local-wp-net
    depends_on:
      - db
      - redis

  # Developer Tooling: WP-CLI
  wpcli:
    container_name: local_wp_cli
    image: wordpress:cli-2.12.0-php8.3
    user: "33:33" # Matches Debian www-data UID/GID from the main WordPress container
    volumes:
      - wp_data:/var/www/html
      - ./wp-content/themes:/var/www/html/wp-content/themes
      - ./wp-content/plugins:/var/www/html/wp-content/plugins
      - ./wp-content/mu-plugins:/var/www/html/wp-content/mu-plugins
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: local_user
      WORDPRESS_DB_PASSWORD: local_password
      WORDPRESS_DB_NAME: local_db
    networks:
      - local-wp-net
    depends_on:
      - db
      - wordpress
    # Keeps container alive so you can execute commands into it
    command: tail -f /dev/null

  db:
    container_name: local_wp_db
    image: mysql:8.0
    restart: unless-stopped
    command: '--default-authentication-plugin=mysql_native_password'
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: local_db
      MYSQL_USER: local_user
      MYSQL_PASSWORD: local_password
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - local-wp-net

  redis:
    container_name: local_wp_redis
    image: redis:alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - local-wp-net

volumes:
  wp_data:
  db_data:
  redis_data:

networks:
  local-wp-net:
    driver: bridge